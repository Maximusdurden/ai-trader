<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Trader - Day Trading HUD</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background: #0a0e27;
			color: #e0e6ed;
			overflow-x: hidden;
		}

		.container {
			padding: 20px;
			max-width: 1800px;
			margin: 0 auto;
		}

		header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 30px;
			border-bottom: 2px solid #1a3a3a;
			padding-bottom: 15px;
		}

		h1 {
			font-size: 28px;
			color: #00d4ff;
			text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
		}

		.timestamp {
			color: #888;
			font-size: 12px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
			gap: 20px;
			margin-bottom: 30px;
		}

		.card {
			background: #0f1729;
			border: 1px solid #1a3a3a;
			border-radius: 8px;
			padding: 20px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
		}

		.card h2 {
			font-size: 14px;
			color: #888;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-bottom: 15px;
			border-bottom: 1px solid #1a3a3a;
			padding-bottom: 10px;
		}

		.metric {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 12px 0;
			font-size: 16px;
		}

		.metric-label {
			color: #888;
		}

		.metric-value {
			font-weight: 600;
			font-family: 'Courier New', monospace;
		}

		.positive {
			color: #00d96d;
		}

		.negative {
			color: #ff4d5e;
		}

		.neutral {
			color: #00d4ff;
		}

		.large-metric {
			font-size: 28px;
			font-weight: bold;
			margin: 15px 0;
			font-family: 'Courier New', monospace;
		}

		.position-item {
			background: #1a2540;
			padding: 15px;
			margin: 10px 0;
			border-radius: 6px;
			border-left: 4px solid #00d4ff;
		}

		.position-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 10px;
		}

		.ticker-symbol {
			font-weight: bold;
			color: #00d4ff;
			font-size: 16px;
		}

		.position-qty {
			color: #00d96d;
			font-weight: 600;
		}

		.position-details {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 10px;
			font-size: 13px;
		}

		.detail-row {
			display: flex;
			justify-content: space-between;
		}

		.trade-item {
			background: #1a2540;
			padding: 12px;
			margin: 8px 0;
			border-radius: 6px;
			border-left: 4px solid #888;
			font-size: 13px;
		}

		.trade-buy {
			border-left-color: #00d96d;
		}

		.trade-sell {
			border-left-color: #ff4d5e;
		}

		.trade-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 8px;
		}

		.trade-time {
			color: #888;
			font-size: 12px;
		}

		.trade-confidence {
			background: #0a0e27;
			padding: 2px 8px;
			border-radius: 3px;
			font-size: 11px;
		}

		.trade-reason {
			color: #aaa;
			font-size: 12px;
			margin-top: 6px;
		}

		.status-badge {
			display: inline-block;
			padding: 3px 8px;
			border-radius: 3px;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
		}

		.status-success {
			background: rgba(0, 217, 109, 0.2);
			color: #00d96d;
		}

		.status-pending {
			background: rgba(0, 212, 255, 0.2);
			color: #00d4ff;
		}

		.status-error {
			background: rgba(255, 77, 94, 0.2);
			color: #ff4d5e;
		}

		.ticker-list {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
			gap: 10px;
		}

		.ticker-item {
			background: #1a2540;
			padding: 12px;
			border-radius: 6px;
			border: 1px solid #1a3a3a;
			text-align: center;
		}

		.ticker-name {
			font-weight: bold;
			color: #00d4ff;
			margin-bottom: 6px;
		}

		.ticker-price {
			font-size: 16px;
			font-weight: 600;
			font-family: 'Courier New', monospace;
			margin-bottom: 4px;
		}

		.ticker-strategy {
			font-size: 11px;
			color: #888;
		}

		.loading {
			color: #888;
			text-align: center;
			padding: 20px;
		}

		.error {
			background: rgba(255, 77, 94, 0.1);
			border: 1px solid rgba(255, 77, 94, 0.3);
			color: #ff4d5e;
			padding: 12px;
			border-radius: 6px;
			margin: 10px 0;
		}

		.section {
			margin-bottom: 30px;
		}

		.section-title {
			font-size: 16px;
			color: #00d4ff;
			margin-bottom: 15px;
			text-transform: uppercase;
			letter-spacing: 1px;
			border-bottom: 2px solid #1a3a3a;
			padding-bottom: 10px;
		}

		.positions-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
			gap: 15px;
		}

		.trades-list {
			background: #0f1729;
			border: 1px solid #1a3a3a;
			border-radius: 8px;
			padding: 20px;
			max-height: 400px;
			overflow-y: auto;
		}

		.refresh-indicator {
			display: inline-block;
			width: 8px;
			height: 8px;
			background: #00d96d;
			border-radius: 50%;
			margin-right: 8px;
			animation: pulse 2s infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.5; }
		}

		@media (max-width: 1200px) {
			.grid {
				grid-template-columns: 1fr 1fr;
			}
		}

		@media (max-width: 768px) {
			.grid {
				grid-template-columns: 1fr;
			}

			.container {
				padding: 15px;
			}

			h1 {
				font-size: 20px;
			}

			.positions-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>⚡ AI TRADER HUD</h1>
			<div>
				<span class="refresh-indicator"></span>
				<span class="timestamp" id="timestamp">Loading...</span>
			</div>
		</header>

		<!-- Account Overview -->
		<div class="grid" id="metricsGrid">
			<div class="card">
				<h2>Portfolio</h2>
				<div class="metric">
					<span class="metric-label">Equity</span>
					<span class="metric-value neutral" id="equity">$0.00</span>
				</div>
				<div class="metric">
					<span class="metric-label">Cash</span>
					<span class="metric-value neutral" id="cash">$0.00</span>
				</div>
				<div class="metric">
					<span class="metric-label">Buying Power</span>
					<span class="metric-value neutral" id="buyingPower">$0.00</span>
				</div>
			</div>

			<div class="card">
				<h2>Today's Performance</h2>
				<div class="large-metric" id="dailyPL">$0.00</div>
				<div class="metric">
					<span class="metric-label">Return %</span>
					<span class="metric-value" id="dailyPLPct">0.00%</span>
				</div>
			</div>

			<div class="card">
				<h2>Trading Stats</h2>
				<div class="metric">
					<span class="metric-label">Total Trades</span>
					<span class="metric-value neutral" id="totalTrades">0</span>
				</div>
				<div class="metric">
					<span class="metric-label">Win Rate</span>
					<span class="metric-value" id="winRate">0%</span>
				</div>
				<div class="metric">
					<span class="metric-label">Avg Confidence</span>
					<span class="metric-value neutral" id="avgConfidence">0%</span>
				</div>
			</div>
		</div>

		<!-- Open Positions -->
		<div class="section">
			<div class="section-title">📊 Open Positions</div>
			<div class="positions-grid" id="positionsContainer">
				<div class="loading">Loading positions...</div>
			</div>
		</div>

		<!-- Active Tickers -->
		<div class="section">
			<div class="section-title">🎯 Active Tickers</div>
			<div class="ticker-list" id="tickersContainer">
				<div class="loading">Loading tickers...</div>
			</div>
		</div>

		<!-- Recent Trades -->
		<div class="section">
			<div class="section-title">📈 Today's Trades</div>
			<div class="trades-list" id="tradesContainer">
				<div class="loading">Loading trades...</div>
			</div>
		</div>
	</div>

	<script>
		const API_BASE = '/api';
		const REFRESH_INTERVAL = 5000; // 5 seconds

		async function fetchDashboard() {
			try {
				const response = await fetch(`${API_BASE}/dashboard`);
				const data = await response.json();
				updateDashboard(data);
			} catch (error) {
				console.error('Dashboard fetch error:', error);
			}
		}

		function updateDashboard(data) {
			updateMetrics(data.metrics);
			updatePositions(data.positions);
			updateTrades(data.trades);
			updateStats(data.stats);
			updateTickers(data.tickers);
			updateTimestamp(data.timestamp);
		}

		function updateMetrics(metrics) {
			if (!metrics) return;

			document.getElementById('equity').textContent = formatCurrency(metrics.equity);
			document.getElementById('cash').textContent = formatCurrency(metrics.cash);
			document.getElementById('buyingPower').textContent = formatCurrency(metrics.buying_power);

			const plElement = document.getElementById('dailyPL');
			const plPctElement = document.getElementById('dailyPLPct');

			plElement.textContent = formatCurrency(metrics.daily_pl);
			plPctElement.textContent = metrics.daily_pl_pct.toFixed(2) + '%';

			plElement.className = 'large-metric';
			plPctElement.className = 'metric-value';

			if (metrics.daily_pl >= 0) {
				plElement.classList.add('positive');
				plPctElement.classList.add('positive');
			} else {
				plElement.classList.add('negative');
				plPctElement.classList.add('negative');
			}
		}

		function updatePositions(positions) {
			const container = document.getElementById('positionsContainer');
			if (!positions || positions.length === 0) {
				container.innerHTML = '<div class="loading">No open positions</div>';
				return;
			}

			container.innerHTML = positions.map(pos => `
				<div class="card position-item">
					<div class="position-header">
						<span class="ticker-symbol">${pos.symbol}</span>
						<span class="position-qty">${pos.qty.toFixed(4)} units</span>
					</div>
					<div class="position-details">
						<div class="detail-row">
							<span>Entry:</span>
							<span class="neutral">\$${pos.entry_price.toFixed(2)}</span>
						</div>
						<div class="detail-row">
							<span>Current:</span>
							<span class="neutral">\$${pos.current_price.toFixed(2)}</span>
						</div>
						<div class="detail-row">
							<span>Market Value:</span>
							<span class="neutral">\$${pos.market_value.toFixed(2)}</span>
						</div>
						<div class="detail-row">
							<span>PnL:</span>
							<span class="${pos.unrealized_pl >= 0 ? 'positive' : 'negative'}">
								\$${pos.unrealized_pl.toFixed(2)} (${pos.unrealized_pl_pct.toFixed(2)}%)
							</span>
						</div>
					</div>
				</div>
			`).join('');
		}

		function updateTrades(trades) {
			const container = document.getElementById('tradesContainer');
			if (!trades || trades.length === 0) {
				container.innerHTML = '<div class="loading">No trades today</div>';
				return;
			}

			container.innerHTML = trades.map(trade => {
				const tradeClass = trade.action === 'BUY' ? 'trade-buy' : 'trade-sell';
				const statusClass = trade.execution_status === 'success' ? 'status-success' :
									trade.execution_status === 'pending' ? 'status-pending' : 'status-error';
				const time = new Date(trade.timestamp).toLocaleTimeString();

				return `
					<div class="trade-item ${tradeClass}">
						<div class="trade-header">
							<span>
								<strong>${trade.ticker}</strong> ${trade.action}
								<span class="status-badge ${statusClass}">${trade.execution_status}</span>
							</span>
							<span class="trade-time">${time}</span>
						</div>
						<div class="detail-row" style="justify-content: space-between; font-size: 12px;">
							<span>Qty: ${trade.quantity ? trade.quantity.toFixed(4) : '-'} | Trigger: ${trade.trigger_type}</span>
							<span class="trade-confidence">Confidence: ${trade.confidence}%</span>
						</div>
						<div class="trade-reason">${trade.reasoning}</div>
					</div>
				`;
			}).join('');
		}

		function updateStats(stats) {
			document.getElementById('totalTrades').textContent = stats.total_trades || 0;

			const winRate = document.getElementById('winRate');
			winRate.textContent = (stats.win_rate || 0).toFixed(1) + '%';
			winRate.className = 'metric-value';
			if (stats.win_rate > 50) winRate.classList.add('positive');
			else if (stats.win_rate < 50 && stats.win_rate > 0) winRate.classList.add('negative');
			else winRate.classList.add('neutral');

			document.getElementById('avgConfidence').textContent = (stats.avg_confidence || 0).toFixed(0) + '%';
		}

		function updateTickers(tickers) {
			const container = document.getElementById('tickersContainer');
			if (!tickers || tickers.length === 0) {
				container.innerHTML = '<div class="loading">No active tickers</div>';
				return;
			}

			container.innerHTML = tickers.map(ticker => `
				<div class="ticker-item">
					<div class="ticker-name">${ticker.ticker}</div>
					<div class="ticker-price">\$${ticker.price.toFixed(2)}</div>
					<div class="ticker-strategy">${ticker.strategy}</div>
				</div>
			`).join('');
		}

		function updateTimestamp(timestamp) {
			const dt = new Date(timestamp);
			document.getElementById('timestamp').textContent = dt.toLocaleTimeString();
		}

		function formatCurrency(value) {
			return new Intl.NumberFormat('en-US', {
				style: 'currency',
				currency: 'USD',
				minimumFractionDigits: 2,
				maximumFractionDigits: 2
			}).format(value || 0);
		}

		// Initial load and refresh
		fetchDashboard();
		setInterval(fetchDashboard, REFRESH_INTERVAL);
	</script>
</body>
</html>
